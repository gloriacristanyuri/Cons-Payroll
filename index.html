<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Payroll Calculator (PHP)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-3xl font-bold mb-2 text-blue-900">Construction Wage Calculator</h1>

        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-semibold mb-1">Worker Name</label>
                <input id="workerName" type="text" placeholder="Juan Dela Cruz" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Role</label>
                <input id="role" type="text" placeholder="Foreman / Carpenter" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Start Date</label>
                <input id="startDate" type="date" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">End Date</label>
                <input id="endDate" type="date" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Daily Rate (₱)</label>
                <input id="dailyRate" type="number" placeholder="610" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Total OT Hours</label>
                <input id="otHours" type="number" placeholder="0" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <div class="flex gap-3">
            <button onclick="addWorker()" class="flex-1 bg-blue-700 text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition">Add Worker</button>
            <button onclick="exportToExcel()" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 transition">Download Excel</button>
        </div>

        <div class="mt-8 overflow-x-auto">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-blue-900 text-white text-sm">
                        <th class="p-3 text-left">Name</th>
                        <th class="p-3 text-center">Days</th>
                        <th class="p-3 text-right">Daily Rate</th>
                        <th class="p-3 text-center">OT Hours</th>
                        <th class="p-3 text-right">Gross Wage</th>
                    </tr>
                </thead>
                <tbody id="workerTableBody" class="text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let workerData = [];

        function addWorker() {
            const name = document.getElementById('workerName').value;
            const role = document.getElementById('role').value;
            const start = new Date(document.getElementById('startDate').value);
            const end = new Date(document.getElementById('endDate').value);
            const rate = parseFloat(document.getElementById('dailyRate').value);
            const ot = parseFloat(document.getElementById('otHours').value) || 0;

            if (!name || isNaN(start) || isNaN(end) || isNaN(rate)) {
                alert("Pakikumpleto ang lahat ng fields.");
                return;
            }

            // Calculate inclusive days
            const diffTime = Math.abs(end - start);
            const totalDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            
            const standardPay = totalDays * rate;
            const hourlyRate = rate / 8;
            const otPay = ot * (hourlyRate * 1.25); // PH Standard: Usually 125% for regular OT
            const grossWage = standardPay + otPay;

            const worker = {
                "Worker Name": name,
                "Role": role,
                "Start Date": document.getElementById('startDate').value,
                "End Date": document.getElementById('endDate').value,
                "Total Days": totalDays,
                "Daily Rate": rate,
                "OT Hours": ot,
                "Gross Wage": grossWage.toFixed(2)
            };

            workerData.push(worker);
            updateTable();
            
            // Clear inputs for next entry
            document.getElementById('workerName').value = '';
            document.getElementById('otHours').value = '';
        }

        function updateTable() {
            const tbody = document.getElementById('workerTableBody');
            tbody.innerHTML = workerData.map(w => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3 font-medium">${w["Worker Name"]}</td>
                    <td class="p-3 text-center">${w["Total Days"]}</td>
                    <td class="p-3 text-right">₱${parseFloat(w["Daily Rate"]).toLocaleString()}</td>
                    <td class="p-3 text-center">${w["OT Hours"]}</td>
                    <td class="p-3 text-right font-bold text-blue-800">₱${parseFloat(w["Gross Wage"]).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function exportToExcel() {
            if (workerData.length === 0) {
                alert("Wala pang data na pwedeng i-export.");
                return;
            }
            const worksheet = XLSX.utils.json_to_sheet(workerData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Payroll");
            XLSX.writeFile(workbook, "Construction_Payroll_PHP.xlsx");
        }
    </script>
</body>
</html>
